services:
  # ─── PostgreSQL (auth, orders, vendors) ───
  postgresql:
    image: postgres:17-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ecom_admin
      POSTGRES_PASSWORD: ecom_secret_2026
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB (products, chat, analytics, notifications) ───
  mongodb: 
    image: mongo:8.0
    container_name: ecom-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecom_admin
      MONGO_INITDB_ROOT_PASSWORD: ecom_secret_2026
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (caching, sessions, rate limiting, presence) ───
  redis:
    image: redis:7.4-alpine
    container_name: ecom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ecom_redis_2026
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ecom_redis_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper (required by Kafka) ───
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.8.0
  #   container_name: ecom-zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181

  # # ─── Kafka (event streaming) ───
  # kafka:
  #   image: confluentinc/cp-kafka:7.8.0
  #   container_name: ecom-kafka
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  mongo_data:
  redis_data: