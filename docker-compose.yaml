services:
  # ─── PostgreSQL (auth, orders, vendors) ───
  postgresql:
    image: postgres:17-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ecom_admin
      POSTGRES_PASSWORD: ecom_secret_2026
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB (products, chat, analytics, notifications) ───
  mongodb: 
    image: mongo:8.0
    container_name: ecom-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecom_admin
      MONGO_INITDB_ROOT_PASSWORD: ecom_secret_2026
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Redis (caching, sessions, rate limiting, presence) ───
  redis:
    image: redis:7.4-alpine
    container_name: ecom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ecom_redis_2026
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ecom_redis_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Kafka (Event Streaming, KRaft Mode) ───
  kafka:
    image: apache/kafka:3.9.1
    container_name: ecom-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Define the internal Docker lane and external Localhost lane
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      # Single-node configuration for local development
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data: